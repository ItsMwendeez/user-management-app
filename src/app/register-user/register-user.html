<section class = "register-page">

    <div class="register-form">

        <h1>Register user</h1>

        <p class="subtitle">Please fill in the form below to register a new user.</p>

     <div class="form-group">
        <label for="username">Full Name</label>
        
        <div class="input-icon">
           <mat-icon class="icon">person</mat-icon>
       <input 
             type="text" 
            id="username"
            placeholder="Enter full Name"
            [(ngModel)]="user.username">
        
        </div>

        <label for="Email">Email</label>

        <div class="input-icon">
            <mat-icon class="icon">mail</mat-icon>

        <input 
            type="email"
            id="Email"
            placeholder="Enter email"
            [(ngModel)]="user.email">
        
        </div>

        <label for="phone">Phone Number</label>

        <div class="input-icon">
            <mat-icon class="icon">phone</mat-icon>
       <input 
        type="tel"
        id="phone"
        placeholder="Enter phone number"
        [(ngModel)]="user.phone">

        </div>

        <label for="role">Role</label>

        <div class="input-icon">
           <mat-icon class="icon">admin_panel_settings</mat-icon>
        <select id="role" [(ngModel)]="user.role">
                 <option value="">Select role</option>
                 <option value="admin">Admin</option>
                 <option value="user">User</option>
                 <option value="staff">Staff</option>
                 <option value="manager">Manager</option>
        </select>
        </div>

        <button class="register-button">
        Register User
        </button>

     </div>
   

    </div>   
 </section>
