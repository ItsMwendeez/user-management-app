<div class = "users-page">

    <div class = "page-header">
        <div class="header-text">
        <h1>Users List</h1>
        
        </div>
        <button class="add-user-btn" (click)="addUser()">
            <mat-icon>person_add</mat-icon>
            Add User
        </button>

    </div>

    <div class = "search-section">

    <div class="search-container">
      <mat-form-field appearance="outline">   <!-- explains the appearance of the input field -->

        <mat-label>
            Search User
        </mat-label>

        <mat-icon matPrefix>
            search
        </mat-icon>
         <input matInput
                type="text"
                placeholder="Search by username, email or role"
                 [(ngModel)]="searchText"
                (input)="currentPage = 1">
        </mat-form-field>

    </div>

    <div class="total-users-card">
        Total Users :{{users.length}}
    </div>

    </div>

        <table mat-table [dataSource]="paginatedUsers" class="mat-elevation-z8">
            <!-- number column -->
            <ng-container matColumnDef="number">
                <th mat-header-cell *matHeaderCellDef>
                    No.
                </th>
                <td mat-cell *matCellDef = "let user; let i = index">
                    {{(currentPage-1)*pageSize + i + 1}}
                </td>

            </ng-container>
            <!-- username column -->
            <ng-container matColumnDef="username">
                <th mat-header-cell *matHeaderCellDef>
                    Username
                </th>
                <td mat-cell *matCellDef = "let user">
                    {{user.username}}
                </td>

            </ng-container>

            <!-- email column  table-->
             <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>
                    Email
                </th>
                <td mat-cell *matCellDef="let user">
                    {{user.email}}
                </td>
             </ng-container>

             <!-- phone column -->
             <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef>
                   Phone
                </th>
                <td mat-cell *matCellDef="let user">
                    {{user.phone}}
                </td>
             </ng-container>

             <!-- role column -->
            <ng-container matColumnDef="role">
                <th mat-header-cell *matHeaderCellDef>
                    Role
                </th>
                <td mat-cell *matCellDef="let user">
                    {{user.role}}
                </td>
            </ng-container>
             

            <!-- actions column -->
            <ng-container matColumnDef="actions"  >
                <th mat-header-cell *matHeaderCellDef>
                    Actions
                </th>
                <td mat-cell *matCellDef="let user"class="action-buttons">
                    <button mat-icon-button class="edit-btn" (click)="editUser(user)">
                        <mat-icon>edit</mat-icon>
                    </button>
                
                    <button mat-icon-button class="delete-btn" (click)="deleteUser(user)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>

            </ng-container>


            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <tr mat-row *matRowDef="let row; let i = index; columns: displayedColumns"></tr>

        </table>

        <div class="no-users" *ngIf="filteredUsers.length === 0">
             <mat-icon>search_off</mat-icon>
             <p>No users found</p>
            <span>Try searching with a different username, email, or role.</span>
        </div>

        <div class="pagination" *ngIf="filteredUsers.length > 0">
            <button class="page-btn" (click)="previousPage()">
                ← Previous
            </button>

      <button
        *ngFor="let page of pages"
        class="page-number"
        [class.active]="currentPage === page"
        (click)="goToPage(page)"
        >
         {{ page }}
        </button>

        <button class="page-btn" (click)="nextPage()">
                Next →
        </button>
</div>
        </div>
